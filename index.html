<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>국어 기말 빈칸 퀴즈</title>
<style>
  :root{
    --bg:#f1faf4; --card:#ffffff; --ink:#0f2e22; --sub:#5f7a6e;
    --line:#dcefe4; --brand:#0fa968; --brand2:#36d28a; --brandsoft:#e7f8ef;
    --ink2:#0a8f54;
    --ok:#0f9d63; --okbg:#e6f8ef; --bad:#e0454f; --badbg:#fdecec;
    --info:#0e7c8c; --infobg:#e4f6f6;
    --chip:#e6f8ef; --chipink:#0a8f54; --gold:#f0a824;
    --shadow:0 14px 34px rgba(16,121,80,.12);
    --shadow-sm:0 6px 16px rgba(16,121,80,.16);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Noto Sans KR","Malgun Gothic",sans-serif;
    background:linear-gradient(180deg,#e3f7ec 0%,#f1faf4 42%,#f6fdf9 100%);
    background-attachment:fixed;
    color:var(--ink); min-height:100vh; line-height:1.5;
    padding:18px 14px calc(40px + env(safe-area-inset-bottom));
  }
  .wrap{max-width:600px;margin:0 auto}
  .top{display:flex;align-items:center;gap:11px;margin:4px 2px 16px}
  .logo{width:40px;height:40px;border-radius:13px;background:linear-gradient(135deg,var(--brand),var(--brand2));
    display:grid;place-items:center;color:#fff;font-weight:800;font-size:19px;box-shadow:var(--shadow-sm)}
  .ttl{font-size:18px;font-weight:800;letter-spacing:-.3px}
  .ttl small{display:block;font-size:11.5px;font-weight:600;color:var(--sub);letter-spacing:0;margin-top:1px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:22px;position:relative;overflow:hidden}
  .hide{display:none!important}

  /* setup */
  h2.sec{font-size:12.5px;color:var(--ink2);margin:2px 2px 9px;font-weight:800;letter-spacing:.2px}
  h2.sec:not(:first-child){margin-top:18px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .opt{border:1.6px solid var(--line);background:#fff;border-radius:14px;padding:12px 10px;font-size:14px;
    font-weight:700;color:var(--ink);cursor:pointer;text-align:center;transition:.15s;user-select:none}
  .opt .n{display:block;font-size:11px;font-weight:600;color:var(--sub);margin-top:2px}
  .opt:hover{border-color:#bfe8d2}
  .opt.on{border-color:var(--brand);background:var(--brandsoft);color:var(--ink2);box-shadow:0 4px 14px rgba(15,169,104,.2)}
  .opt.on .n{color:var(--chipink)}
  .opt .ico{font-size:18px;display:block;margin-bottom:3px}
  .row4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .start{margin-top:20px;width:100%;border:none;border-radius:16px;padding:17px;font-size:16.5px;font-weight:800;color:#fff;
    background:linear-gradient(135deg,var(--brand),var(--brand2));cursor:pointer;box-shadow:0 10px 24px rgba(15,169,104,.4)}
  .start:active{transform:translateY(1px)}
  .meta{font-size:12.5px;color:var(--sub);text-align:center;margin-top:13px;line-height:1.6}

  /* quiz */
  .bar{height:9px;border-radius:99px;background:#e5f3ea;overflow:hidden;margin-bottom:8px}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--brand),var(--brand2));width:0;transition:width .35s}
  .qhead{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--sub);font-weight:700;margin-bottom:13px}
  .score{color:var(--ink2)}
  .streak{color:var(--gold);font-weight:800}
  .chip{display:inline-block;font-size:11px;font-weight:800;color:var(--chipink);background:var(--chip);
    padding:5px 11px;border-radius:999px;margin-bottom:15px;letter-spacing:.2px}
  .chip.t-작가{color:#9a6200;background:#fff2d6}
  .chip.t-작품{color:#0a7d5a;background:#e3f6ee}
  .chip.t-내용{color:#0e6f80;background:#e0f4f7}
  .qtext{font-size:21px;font-weight:800;line-height:1.65;letter-spacing:-.3px;margin-bottom:6px;word-break:keep-all}
  .qsub{font-size:13px;font-weight:800;color:var(--ink2);background:var(--brandsoft);display:inline-block;padding:6px 12px;border-radius:10px;margin:4px 0 14px}
  .qtext b{color:var(--ink2)}
  .qtext .blk{display:inline-block;min-width:80px;border-bottom:3px solid var(--brand);margin:0 3px;
    color:var(--brand);text-align:center;font-weight:900}
  .blk.reveal-target{cursor:pointer;border-bottom:3px dashed var(--brand);padding:0 8px;border-radius:6px;
    background:var(--brandsoft);animation:pulse 1.6s ease-in-out infinite}
  .blk.shown{color:var(--ok);border-bottom-style:solid;background:var(--okbg);animation:none}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
  .answer-box{font-size:24px;font-weight:900;color:var(--ink);background:#f3fbf6;border:1.6px dashed #bfe6d1;
    border-radius:15px;padding:16px;text-align:center;margin-bottom:6px;word-break:keep-all}
  .answer-box.reveal-target{cursor:pointer;font-size:17px;color:var(--ink2);transition:.15s}
  .answer-box.reveal-target:hover{background:var(--brandsoft);border-color:var(--brand)}
  .answer-box.shown{border-style:solid;border-color:var(--ok);background:var(--okbg);color:var(--ink);font-size:24px}
  input.field{width:100%;border:2px solid var(--line);border-radius:15px;padding:16px;font-size:18px;font-weight:700;
    font-family:inherit;color:var(--ink);outline:none;background:#fff;transition:.15s;margin-top:10px}
  input.field:focus{border-color:var(--brand);box-shadow:0 0 0 4px rgba(15,169,104,.15)}
  input.field.good{border-color:var(--ok);background:var(--okbg)}
  input.field.wrong{border-color:var(--bad);background:var(--badbg)}
  .btns{display:flex;gap:10px;margin-top:13px}
  .btn{flex:1;border:none;border-radius:15px;padding:16px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;transition:.12s}
  .btn.full{width:100%}
  .btn.primary{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;box-shadow:0 7px 18px rgba(15,169,104,.34)}
  .btn.ghost{background:#eef4f0;color:var(--sub)}
  .btn.good{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;box-shadow:0 7px 18px rgba(15,169,104,.34)}
  .btn.soft{background:#fdeced;color:#b3242e}
  .btn:active{transform:translateY(1px)}
  .reveal-btn{margin-top:13px}
  .fb{margin-top:14px;border-radius:15px;padding:15px 16px;font-size:16px;font-weight:800;display:none}
  .fb.show{display:block;animation:pop .25s cubic-bezier(.2,.9,.3,1.3)}
  @keyframes pop{from{opacity:0;transform:scale(.92) translateY(6px)}to{opacity:1;transform:none}}
  .fb.ok{background:var(--okbg);color:#0b7a4c}
  .fb.no{background:var(--badbg);color:#b3242e}
  .fb.info{background:var(--infobg);color:#0a6675}
  .fb .ans{font-weight:900}
  .fb .extra{display:block;font-weight:600;color:var(--sub);font-size:12.5px;margin-top:6px}
  .hintbtn{background:none;border:none;color:var(--brand);font-weight:800;font-size:13px;cursor:pointer;padding:6px 2px;margin-top:6px}
  .homelink{display:block;width:100%;margin-top:16px;background:none;border:none;color:var(--sub);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;padding:9px;text-align:center;border-top:1px solid var(--line)}
  .homelink:hover{color:var(--ink2)}
  /* emoji burst */
  .emoji{position:absolute;top:120px;font-size:26px;pointer-events:none;z-index:6;animation:floatUp 1.05s ease forwards}
  @keyframes floatUp{0%{opacity:0;transform:translateY(6px) scale(.5)}18%{opacity:1}100%{opacity:0;transform:translateY(-96px) scale(1.25)}}

  /* result */
  .big{font-size:58px;font-weight:900;text-align:center;line-height:1.05;
    background:linear-gradient(135deg,var(--brand),var(--brand2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .rsub{text-align:center;color:var(--sub);font-weight:700;margin:4px 0}
  .rstreak{text-align:center;color:var(--gold);font-weight:800;font-size:14px;margin-top:2px}
  .praise{text-align:center;font-size:18px;font-weight:800;margin:12px 0 18px}
  .wrongttl{font-size:13px;font-weight:800;color:var(--ink2);margin:20px 2px 10px}
  .wrong-item{border:1px solid var(--line);border-left:4px solid var(--bad);border-radius:13px;padding:11px 13px;margin-bottom:9px;background:#fff}
  .wrong-item .q{font-size:13.5px;font-weight:700;line-height:1.5;word-break:keep-all}
  .wrong-item .a{font-size:13px;margin-top:5px}
  .wrong-item .a b{color:var(--ok)}
  .wrong-item .a s{color:var(--bad);text-decoration:line-through;opacity:.8}
  .footer{font-size:11px;color:#9bb3a7;text-align:center;margin-top:22px}

  /* 홈 선택 */
  .homechoice{display:block;width:100%;text-align:left;border:1.6px solid var(--line);background:#fff;border-radius:18px;padding:20px;margin-bottom:13px;cursor:pointer;font-family:inherit;transition:.15s}
  .homechoice:hover{border-color:var(--brand);box-shadow:var(--shadow-sm)}
  .homechoice:active{transform:translateY(1px)}
  .homechoice .ic{font-size:30px;display:block}
  .homechoice .h{font-size:18px;font-weight:800;color:var(--ink);display:block;margin-top:7px}
  .homechoice .s{font-size:13px;color:var(--sub);font-weight:600;display:block;margin-top:3px}
  .homechoice.accent{background:linear-gradient(135deg,#eafaf1,#f4fcf7);border-color:#9fe0bf}
  /* 공부하기 */
  .studyhead{font-size:15px;font-weight:800;color:var(--ink2);margin-bottom:12px}
  .filterbar{display:flex;gap:7px;overflow-x:auto;padding-bottom:11px;margin-bottom:8px}
  .filterbar::-webkit-scrollbar{display:none}
  .filterbar .f{flex:0 0 auto;border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:8px 14px;font-size:13px;font-weight:700;color:var(--sub);cursor:pointer;white-space:nowrap;user-select:none}
  .filterbar .f.on{border-color:var(--brand);background:var(--brandsoft);color:var(--ink2)}
  .studycard{border:1px solid var(--line);border-radius:16px;padding:16px 17px;margin-bottom:13px;background:#fff;box-shadow:0 4px 14px rgba(16,121,80,.06)}
  .studycard h3{font-size:19px;font-weight:800;margin:8px 0 2px;color:var(--ink)}
  .studycard .era{font-size:12.5px;color:var(--ink2);font-weight:700;margin-bottom:11px}
  .studycard .desc{font-size:14.5px;line-height:1.72;color:#2c4a3e;word-break:keep-all;margin-bottom:13px}
  .studycard .wlabel{font-size:11.5px;font-weight:800;color:var(--ink2);background:var(--brandsoft);display:inline-block;padding:4px 10px;border-radius:999px;margin-bottom:7px}
  .studycard ul{margin:0;padding:0;list-style:none}
  .studycard li{font-size:14px;padding:6px 2px;border-bottom:1px dashed #eef3ef;word-break:keep-all;line-height:1.5}
  .studycard li:last-child{border-bottom:none}
  .studycard li .t{font-weight:700;color:var(--ink)}
  .studycard li .a{color:var(--sub);font-weight:600}
  /* 스와이프 덱 */
  .decknav{display:flex;align-items:center;justify-content:center;gap:18px;margin:2px 0 10px}
  .decknav #deckPos{font-size:13.5px;font-weight:800;color:var(--ink2);min-width:70px;text-align:center}
  .navbtn{width:42px;height:42px;border-radius:50%;border:1.5px solid var(--line);background:#fff;color:var(--ink2);font-size:23px;font-weight:800;cursor:pointer;line-height:1;display:grid;place-items:center;padding:0}
  .navbtn:active{background:var(--brandsoft);transform:scale(.94)}
  .deck{display:flex;overflow-x:auto;overflow-y:hidden;scroll-snap-type:x mandatory;height:clamp(340px,58vh,560px);-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .deck::-webkit-scrollbar{display:none}
  .slide{flex:0 0 100%;scroll-snap-align:center;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:1px 1px 4px}
  .slide::-webkit-scrollbar{display:none}
  .slide .studycard{margin-bottom:0}
  .swipehint{text-align:center;font-size:12px;color:var(--sub);font-weight:600;margin-top:11px}

  @media (max-width:400px){
    body{padding:14px 10px 32px}
    .panel{padding:17px;border-radius:19px}
    .qtext{font-size:18.5px}
    .answer-box{font-size:21px;padding:14px}
    .answer-box.shown{font-size:21px}
    .big{font-size:48px}
    .opt{padding:11px 7px;font-size:13.5px}
    .row4{gap:6px}
    .btn{padding:15px;font-size:15px}
    .ttl{font-size:16.5px}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="logo">국</div>
    <div class="ttl">국어 기말 빈칸 퀴즈<small>갈래별·시대별 한눈에 보기 · 고전＋현대 문학</small></div>
  </div>

  <!-- ===== HOME ===== -->
  <div id="home" class="panel">
    <button class="homechoice accent" id="goStudy">
      <span class="ic">📖</span>
      <span class="h">공부하기</span>
      <span class="s" id="studyCount">시대·갈래별 카드 내용을 먼저 익혀요</span>
    </button>
    <button class="homechoice" id="goQuiz">
      <span class="ic">✏️</span>
      <span class="h">문제 풀기</span>
      <span class="s" id="quizCount">작품·작가·핵심 내용 빈칸 퀴즈</span>
    </button>
  </div>

  <!-- ===== STUDY ===== -->
  <div id="study" class="panel hide">
    <div class="studyhead">📖 카드로 공부하기</div>
    <div class="filterbar" id="studyFilter"></div>
    <div class="decknav">
      <button class="navbtn" id="deckPrev" aria-label="이전 카드">‹</button>
      <span id="deckPos">1 / 33</span>
      <button class="navbtn" id="deckNext" aria-label="다음 카드">›</button>
    </div>
    <div class="deck" id="studyDeck"></div>
    <div class="swipehint">← 옆으로 쓸어 넘기거나 ‹ › 버튼을 누르세요 →</div>
    <button class="homelink" id="studyHome">← 홈으로 가기</button>
  </div>

  <!-- ===== SETUP ===== -->
  <div id="setup" class="panel hide">
    <h2 class="sec">① 학습 방식</h2>
    <div class="grid" id="modeGrid"></div>
    <h2 class="sec">② 범위 고르기</h2>
    <div class="grid" id="catGrid"></div>
    <h2 class="sec">③ 문제 유형</h2>
    <div class="grid" id="typeGrid"></div>
    <h2 class="sec">④ 문항 수</h2>
    <div class="row4" id="countGrid"></div>
    <button class="start" id="startBtn">시작하기 🌱</button>
    <div class="meta" id="poolInfo"></div>
    <button class="homelink" id="setupHome">← 홈으로 가기</button>
  </div>

  <!-- ===== QUIZ ===== -->
  <div id="quiz" class="panel hide">
    <div class="bar"><i id="prog"></i></div>
    <div class="qhead">
      <span id="counter">1 / 10</span>
      <span><span class="score" id="scoreTxt">맞은 개수 0</span> <span class="streak" id="streakTxt"></span></span>
    </div>
    <span class="chip" id="catChip">분야</span>
    <div id="qbody"></div>

    <!-- typing mode -->
    <input class="field hide" id="field" type="text" inputmode="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="정답을 입력하고 Enter">
    <button class="hintbtn hide" id="hintBtn">💡 힌트 보기</button>

    <!-- reveal mode -->
    <button class="btn primary full reveal-btn hide" id="revealBtn">👆 정답 확인하기</button>

    <div class="fb" id="fb"></div>

    <div class="btns" id="typeBtns">
      <button class="btn ghost" id="skipBtn">모르겠어요</button>
      <button class="btn primary" id="goBtn">확인</button>
    </div>
    <div class="btns hide" id="gradeBtns">
      <button class="btn soft" id="gradeBad">🔁 헷갈렸어요</button>
      <button class="btn good" id="gradeGood">😊 맞혔어요!</button>
    </div>
    <button class="btn primary full hide" id="nextBtn" style="margin-top:13px">다음 →</button>
    <button class="homelink" id="quizHome">← 홈으로 가기</button>
  </div>

  <!-- ===== RESULT ===== -->
  <div id="result" class="panel hide">
    <div class="big" id="pct">0%</div>
    <div class="rsub" id="rsub">10문제 중 0개 정답</div>
    <div class="rstreak" id="rstreak"></div>
    <div class="praise" id="praise"></div>
    <div class="btns">
      <button class="btn primary" id="retryWrong">틀린 문제만 다시 ↻</button>
      <button class="btn ghost" id="resultHome">처음으로</button>
    </div>
    <div class="wronglist" id="wronglist"></div>
  </div>

  <div class="footer">작품명·작가명·핵심 내용 빈칸 채우기</div>
</div>

<script>
/* ============================================================
   교재 카드 데이터  (작품 [제목, 작가, 작가별칭배열?])
   ============================================================ */
const DATA = [
/* ===== 고전 · 운문 ===== */
{cat:'고전 · 운문', era:'조선 전기', genre:'악장',
 works:[['신도가','정도전'],['용비어천가','정인지 외',['정인지 외','정인지']]],
 concepts:[
  {t:'악장은 조선 전기 ___의 여러 의식과 행사에 쓰인 노래이다.', a:'궁중'},
  {t:'악장은 주로 조선 왕조 개국의 ___을 밝히고 번영을 송축하는 내용이다.', a:'정당성'}]},
{cat:'고전 · 운문', era:'조선 전기', genre:'언해',
 works:[['두시언해',''],['훈민정음 언해',''],['석보상절','']],
 concepts:[
  {t:'훈민정음 창제 이후 한문 문헌을 우리글로 번역한 것을 ___(이)라 한다.', a:'언해'}]},
{cat:'고전 · 운문', era:'조선 전기', genre:'시조',
 works:[['눈 마즈 휘여진 디를','원천석'],['십 년을 경영하야','송순'],['강호사시가','맹사성'],['도산십이곡','이황'],['어져 내 일이야','황진이']],
 concepts:[
  {t:'조선 전기 시조는 ___층의 미의식과 부합하여 문학의 주요 갈래로 자리 잡았다.', a:'사대부'},
  {t:'왕조 교체기의 시조는 주로 ___(憂國忠節)의 내용을 담았다.', a:'우국충절', acc:['우국충절']}]},
{cat:'고전 · 운문', era:'조선 전기', genre:'가사',
 works:[['상춘곡','정극인'],['면앙정가','송순'],['사미인곡','정철'],['속미인곡','정철']],
 concepts:[
  {t:'가사는 행수에 제한이 없는 ___음보의 시가이다.', a:'4', acc:['4','사','네']},
  {t:'조선 전기 가사는 주로 자연 친화나 임금에 대한 ___을 표현했다.', a:'그리움', acc:['그리움','연군']}]},
{cat:'고전 · 운문', era:'조선 중·후기', genre:'시조',
 works:[['동기로 세 몸 되어','박인로'],['청산도 절로절로','송시열'],['만흥','윤선도'],['오우가','윤선도'],['어부사시사','윤선도']],
 concepts:[]},
{cat:'고전 · 운문', era:'조선 후기', genre:'가사',
 works:[['누항사','박인로'],['만언사','안조환',['안조환','안조원']],['일동장유가','김인겸'],['연행가','홍순학'],['춘유가',''],['갑민가','']],

const norm = s => (s||'').toString().trim().toLowerCase()
  .replace(/\s+/g,'').replace(/[「」『』《》〈〉""''`’“”.,··•・~\-—–_/()\[\]{}!?:;]/g,'');
const shuffle = a => { for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];} return a; };

function buildPool(){
  const Q = [];
  const seenAuthor = new Set();
  for(const c of DATA){
    const ctx = c.era+' · '+c.genre;
    for(const w of c.works){
      const [title,author,accAuthor] = w;
      if(author && author!=='작자 미상'){
        const key='작가|'+norm(title);
        if(!seenAuthor.has(key)){
          seenAuthor.add(key);
          const acc=(accAuthor||[author]).map(norm);
          Q.push({type:'작가', cat:c.cat, ctx, html:'다음 작품을 지은 <b>작가</b>는?',
                  target:'「'+title+'」', ans:author, acc, hint:ctx, sub:c.genre+' · '+c.era});
        }
      }
    }
    const byAuthor = {};
    for(const w of c.works){
      const [title,author] = w;
      if(author && author!=='작자 미상'){ (byAuthor[author]=byAuthor[author]||[]).push(title); }
    }
    for(const author in byAuthor){
      const titles = byAuthor[author];
      Q.push({type:'작품', cat:c.cat, ctx,
              html:'<b>'+author+'</b>의 작품을 한 가지 쓰시오.',
              target:'', ans:titles[0], accDisp:titles, acc:titles.map(norm), hint:'작가: '+author, sub:c.genre+' · '+c.era});
    }
    for(const cc of (c.concepts||[])){
      Q.push({type:'내용', cat:c.cat, ctx, concept:true, text:cc.t, ans:cc.a,
              acc:(cc.acc||[cc.a]).map(norm), hint:ctx});
    }
  }
  return Q;
}

'현대 · 운문|1930년대~광복|시':'본격적인 현대시가 출현하며 경향이 다양해졌다. 순수성을 추구한 시문학파, 이미지즘·초현실주의의 모더니즘, 생명을 탐구한 생명파, 향토적 자연을 노래한 청록파가 있었고, 백석은 공동체 의식을, 이육사·윤동주는 지식인의 양심을 시로 담았다.',
'현대 · 운문|광복 직후|시':'광복 후 극심한 이념 대립이 문단에도 이어졌다. 청록파의 합동 시집 「청록집」, 윤동주의 유고 시집 「하늘과 바람과 별과 시」, 이육사의 유고 시집 「육사 시집」 등이 발표되었다.',
'현대 · 운문|1950년대|시':'6·25 전쟁의 비극적 체험과 전후의 혼란, 분단 현실을 주로 다루었다. 전통적 율격과 정서를 토대로 한 시조 부흥 운동과 모더니즘 계열의 주지시도 나타났다.',
'현대 · 운문|1960년대|시':'4·19에서 5·16으로 이어지는 격동기를 겪으며, 부조리한 현실에 적극적으로 목소리를 낸 현실 참여시와 인간 본질의 순수를 추구한 순수시로 나뉘었다.',
'현대 · 운문|1970년대|시':'산업화·도시화로 인한 농촌 공동체의 붕괴, 열악한 노동 환경, 민주화에 대한 열망 속에서 노동자·농민·도시 하층민 등 민중의 소외된 현실을 고발하고 그 개선을 모색했다.',
'현대 · 운문|1980년대|시':'민주화에 대한 열망이 이어지며 시대 상황을 비판하거나 풍자하는 시가 많았다. 기존 형식을 벗어난 형식 실험도 활발했다.',
'현대 · 운문|1990년대 이후|시':'정치적 관심보다 개인의 일상과 내면에 주목했고, 환경·생태에 관심을 두는 경향이 나타났다. 여성 작가들의 활동도 크게 확대되었다.',
'현대 · 산문|개화기|신소설·희곡':'대표적 서사 문학은 신소설이다. 봉건 질서의 타파, 개화·계몽, 자주독립 사상을 주로 담았다. 판소리를 근간으로 한 창극도 인기를 끌었다.',
'현대 · 산문|1910년대|소설·희곡':'1917년 이광수의 「무정」으로 본격적인 근대 소설이 시작되었다. 자유연애와 민족주의 사상을 고취하고 구어체 문장을 확립하고자 했다. 근대극도 시도되었으나 일제의 검열로 성과는 크지 않았다.',
'현대 · 산문|1920년대|소설·희곡':'어두운 사회 현실을 비판적으로 묘사한 사실주의 소설이 주류를 이루었고, 유미주의적 낭만주의 소설도 유행했다. 후반기에는 궁핍한 농민·노동자를 다룬 경향 소설이 창작되었다. 극예술협회(김우진)와 토월회(박승희)가 현대극 정립에 힘썼다.',
'현대 · 산문|1930년대~광복|소설·희곡·수필':'일제의 억압이 심해지며 모더니즘 소설, 농촌·농민 소설, 역사 소설, 가족사 소설 등이 창작되었다. 1940년대에는 우리말 사용이 금지되었다. 극예술연구회의 활동으로 극문학이 크게 발전했고, 수필도 독자적 갈래로 자리 잡았다.',
'현대 · 산문|광복 직후|소설·희곡·수필':'일제 강점기를 반성·승화하려는 자기반성적 작품과 순수 문학을 지향한 작품, 광복 후의 사회 현실과 인간의 삶을 다룬 작품들이 발표되었다.',
'현대 · 산문|1950년대|소설·희곡·수필':'전쟁으로 인간성을 잃거나 무기력해진 인물을 통해 부조리한 현실을 고발하고 인간의 실존을 탐구했다. 전쟁의 비극을 그리면서도 인간애를 잃지 않으려는 작품도 있었다.',
'현대 · 산문|1960년대|소설·희곡·수필':'남북 분단의 비극을 정면으로 다루며 분단 역사에 대한 인식이 깊어졌다. 사회의 부조리나 현대인의 소외·방황을 감각적인 문체로 표현한 작품도 나왔다.',
'현대 · 산문|1970년대|소설·희곡·수필':'노동자의 투쟁과 도시 빈민의 삶을 사실적으로 반영했다. 극문학에서는 기법의 혁신과 전통의 현대적 수용을 꾀한 실험적 연극이 시도되었다.',
'현대 · 산문|1980년대|소설·희곡':'억압적인 사회 현실을 고발하는 작품과 대하소설이 많이 발표되었다. 섬세한 서정성을 갖춘 여성 작가들이 등장했고, 마당극을 계승한 공연과 뮤지컬이 발전했다.',
'현대 · 산문|1990년대 이후|소설·희곡':'개인의 일상에 관심을 두며 주제와 내용이 다양해졌다. 운동권 이야기를 돌아보는 후일담 문학이 형성되었고, 2000년대 이후에는 인터넷 연재소설 등 새로운 창작 방식이 등장했다.',
};
DATA.forEach(c=>{ c.desc = DESC[c.cat+'|'+c.era+'|'+c.genre] || ''; });

/* ============================================================
   설정 UI
   ============================================================ */
const MODES = [
  {k:'type',   ico:'✍️', label:'타이핑 연습', desc:'직접 입력'},
  {k:'reveal', ico:'👆', label:'빈칸 클릭', desc:'눌러서 정답 확인'},
];
const CATS = [
  {k:'전체', label:'전체'},
  {k:'고전 · 운문', label:'고전·운문'},
  {k:'고전 · 산문', label:'고전·산문'},
  {k:'현대 · 운문', label:'현대·운문'},
  {k:'현대 · 산문', label:'현대·산문'},
];
const TYPES = [
  {k:'전체', label:'전체 섞기'},
  {k:'작가', label:'작가명'},
  {k:'작품', label:'작품명'},
  {k:'내용', label:'핵심 내용'},
];
const COUNTS = [10,20,40,999];
let sel = {mode:'type', cat:'전체', type:'전체', count:20};

function countPool(cat,type){
  return ALLPOOL.filter(q=>(cat==='전체'||q.cat===cat)&&(type==='전체'||q.type===type)).length;
}
function renderSetup(){
  const mg=document.getElementById('modeGrid'); mg.innerHTML='';
  MODES.forEach(m=>{
    const d=document.createElement('div'); d.className='opt'+(sel.mode===m.k?' on':'');
    d.innerHTML='<span class="ico">'+m.ico+'</span>'+m.label+'<span class="n">'+m.desc+'</span>';
    d.onclick=()=>{sel.mode=m.k; renderSetup();}; mg.appendChild(d);
  });
  const cg=document.getElementById('catGrid'); cg.innerHTML='';
  CATS.forEach(c=>{
    const n=countPool(c.k, sel.type);
    const d=document.createElement('div'); d.className='opt'+(sel.cat===c.k?' on':'');
    d.innerHTML=c.label+'<span class="n">'+n+'문항</span>';
    d.onclick=()=>{sel.cat=c.k; renderSetup();}; cg.appendChild(d);
  });
  const tg=document.getElementById('typeGrid'); tg.innerHTML='';
  TYPES.forEach(t=>{
    const n=countPool(sel.cat, t.k);
    const d=document.createElement('div'); d.className='opt'+(sel.type===t.k?' on':'');
    d.innerHTML=t.label+'<span class="n">'+n+'문항</span>';
    d.onclick=()=>{sel.type=t.k; renderSetup();}; tg.appendChild(d);
  });
  const xg=document.getElementById('countGrid'); xg.innerHTML='';
  const avail=countPool(sel.cat,sel.type);
  COUNTS.forEach(x=>{
    const lab = x===999?'전체':x+'개';
    const dis = x!==999 && x>avail;
    const d=document.createElement('div'); d.className='opt'+(sel.count===x?' on':'');
    if(dis){d.style.opacity=.35;}
    d.innerHTML=lab;
    d.onclick=()=>{ sel.count = dis?999:x; renderSetup();}; xg.appendChild(d);
  });
  const realCount = sel.count===999?avail:Math.min(sel.count,avail);
  document.getElementById('poolInfo').innerHTML =
    '선택 범위에 <b>'+avail+'문항</b> · 이번엔 <b>'+realCount+'문제</b> 출제';
}

/* ============================================================
   퀴즈 진행
   ============================================================ */
let queue=[], idx=0, score=0, answered=false, wrongs=[], streak=0, bestStreak=0;
const PRAISE=['정확해요! 🎯','완벽해요! 🌟','잘했어요! 💚','대단해요! 🎉','최고예요! 👏','맞았어요! ✨','훌륭해요! 🙌','바로 그거예요! 😎'];
const ENC=['괜찮아요, 다시 보면 외워져요! 💪','이제 알았으니 됐어요! 📌','한 번 더 보면 내 거예요! ✨','실수는 공부의 일부예요! 🌱'];
const pick = a => a[Math.random()*a.length|0];
function praiseMsg(){
  let m=pick(PRAISE);
  if(streak>=5) m='🔥 '+streak+'연속 정답! '+m;
  else if(streak>=3) m='🔥 '+streak+'연속! '+m;
  return m;
}

function startQuiz(pool){
  let list;
  if(sel.type==='전체'){
    const buckets={작가:[],작품:[],내용:[]};
    pool.forEach(q=>buckets[q.type].push(q));
    Object.values(buckets).forEach(shuffle);
    list=[]; let more=true;
    while(more){ more=false;
      for(const k of ['내용','작품','작가']){ if(buckets[k].length){list.push(buckets[k].shift()); more=true;} }
    }
  } else { list=shuffle(pool.slice()); }
  const n = sel.count===999?list.length:Math.min(sel.count,list.length);
  queue=list.slice(0,n);
  idx=0; score=0; wrongs=[]; streak=0; bestStreak=0;
  showOnly('quiz');
  showQ();
}

const $ = id => document.getElementById(id);
function showAll(...ids){ ids.forEach(i=>$(i).classList.remove('hide')); }
function hideAll(...ids){ ids.forEach(i=>$(i).classList.add('hide')); }

function showQ(){
  answered=false;
  const q=queue[idx];
  $('counter').textContent=(idx+1)+' / '+queue.length;
  $('scoreTxt').textContent='맞은 개수 '+score;
  $('streakTxt').textContent = streak>=2 ? ('· 🔥'+streak) : '';
  $('prog').style.width=(idx/queue.length*100)+'%';
  const chip=$('catChip'); chip.textContent=q.cat+'  ·  '+q.ctx; chip.className='chip t-'+q.type;

  // reset shared
  $('fb').className='fb';
  hideAll('field','hintBtn','revealBtn','typeBtns','gradeBtns','nextBtn');

  const body=$('qbody');
  const isReveal = sel.mode==='reveal';

  if(q.concept){
    const mark = isReveal
      ? '<span class="blk reveal-target" id="rt">❓ 정답</span>'
      : '<span class="blk">&nbsp;?&nbsp;</span>';
    body.innerHTML='<div class="qtext">'+q.text.replace('___',mark)+'</div>';
  }else{
    const sub = q.sub ? '<div class="qsub">갈래 · 시대 — '+esc(q.sub)+'</div>' : '';
    let cue = (q.type==='작가' && q.target) ? '<div class="answer-box">'+q.target+'</div>' : '';
    if(isReveal) cue += '<div class="answer-box reveal-target" id="rt"'+(cue?' style="margin-top:10px"':'')+'>👆 눌러서 정답 보기</div>';
    body.innerHTML='<div class="qtext">'+q.html+'</div>'+sub+cue;
  }

  if(isReveal){
    showAll('revealBtn');
    $('revealBtn').textContent='👆 정답 확인하기';
    const rt=$('rt'); if(rt) rt.onclick=doReveal;
  }else{
    const f=$('field'); f.value=''; f.className='field'; f.disabled=false;
    f.placeholder = q.type==='작품' ? '작품명을 입력하고 Enter'
                  : q.type==='작가' ? '작가명을 입력하고 Enter' : '정답을 입력하고 Enter';
    showAll('field','typeBtns');
    if(q.type!=='내용') showAll('hintBtn');
    $('hintBtn').textContent='💡 힌트 보기';
    $('goBtn').textContent='확인';
    setTimeout(()=>f.focus(),60);
  }
}

function extraHtml(q){
  if(q.accDisp && q.accDisp.length>1) return '<span class="extra">그 밖의 정답: '+esc(q.accDisp.slice(1).join(', '))+'</span>';
  return '';
}

/* --- 타이핑 채점 --- */
function check(skip){
  const q=queue[idx];
  const f=$('field');
  const user=f.value;
  const correct = !skip && q.acc.includes(norm(user));
  answered=true; f.disabled=true;
  const fb=$('fb');
  const accAll = q.accDisp ? q.accDisp.join(' / ') : q.ans;
  if(correct){
    score++; streak++; bestStreak=Math.max(bestStreak,streak);
    f.classList.add('good');
    fb.className='fb ok show';
    fb.innerHTML='⭕ '+praiseMsg()+'<span class="extra">정답: '+esc(q.ans)+'</span>'+extraHtml(q);
    burst();
  }else{
    streak=0;
    f.classList.add('wrong');
    fb.className='fb no show';
    fb.innerHTML='❌ 정답은 <span class="ans">'+esc(accAll)+'</span>'
      +'<span class="extra">'+(skip?pick(ENC):'입력: '+esc(user||'(빈칸)'))+'</span>';
    wrongs.push({q, user:skip?'(모르겠어요)':user, ans:accAll});
  }
  $('scoreTxt').textContent='맞은 개수 '+score;
  $('streakTxt').textContent = streak>=2 ? ('· 🔥'+streak) : '';
  hideAll('typeBtns','hintBtn');
  toNext();
}

/* --- 클릭 → 정답 공개 --- */
function doReveal(){
  if(answered) return;
  answered=true;
  const q=queue[idx];
  const rt=$('rt');
  if(rt){
    rt.classList.add('shown'); rt.classList.remove('reveal-target'); rt.onclick=null;
    rt.textContent = q.accDisp ? q.accDisp.join(' / ') : q.ans;
  }
  const fb=$('fb');
  fb.className='fb info show';
  fb.innerHTML='💡 정답은 <span class="ans">'+esc(q.accDisp?q.accDisp.join(' / '):q.ans)+'</span>'
    +'<span class="extra">잘 맞혔나요? 아래에서 선택해 주세요</span>';
  hideAll('revealBtn');
  showAll('gradeBtns');
}

/* --- 클릭모드 자가 채점 --- */
function selfGrade(ok){
  const q=queue[idx];
  const fb=$('fb');
  if(ok){
    score++; streak++; bestStreak=Math.max(bestStreak,streak);
    fb.className='fb ok show';
    fb.innerHTML='⭕ '+praiseMsg()+'<span class="extra">정답: '+esc(q.accDisp?q.accDisp.join(' / '):q.ans)+'</span>';
    burst();
  }else{
    streak=0;
    fb.className='fb no show';
    fb.innerHTML='📌 '+pick(ENC)+'<span class="extra">정답: '+esc(q.accDisp?q.accDisp.join(' / '):q.ans)+'</span>';
    wrongs.push({q, user:'(헷갈렸어요)', ans:(q.accDisp?q.accDisp.join(' / '):q.ans)});
  }
  $('scoreTxt').textContent='맞은 개수 '+score;
  $('streakTxt').textContent = streak>=2 ? ('· 🔥'+streak) : '';
  hideAll('gradeBtns');
  toNext();
}

function toNext(){
  const nb=$('nextBtn');
  nb.textContent = (idx+1<queue.length)?'다음 →':'결과 보기 🎉';
  showAll('nextBtn');
}
function next(){
  if(idx+1<queue.length){ idx++; showQ(); }
  else showResult();
}

/* --- 칭찬 이모지 연출 --- */
function burst(){
  const host=$('quiz'); const set=['✨','🌟','💚','🎉','👏','⭐','🌿'];
  for(let i=0;i<7;i++){
    const s=document.createElement('span'); s.className='emoji'; s.textContent=pick(set);
    s.style.left=(26+Math.random()*48)+'%';
    s.style.animationDelay=(Math.random()*0.18)+'s';
    host.appendChild(s); setTimeout(()=>s.remove(),1300);
  }
}

/* --- 결과 --- */
function showResult(){
  $('prog').style.width='100%';
  showOnly('result');
  const total=queue.length, pct=Math.round(score/total*100);
  $('pct').textContent=pct+'%';
  $('rsub').textContent=total+'문제 중 '+score+'개 정답';
  $('rstreak').textContent = bestStreak>=3 ? ('🔥 최고 '+bestStreak+'연속 정답!') : '';
  let msg;
  if(pct===100) msg='🏆 완벽해요! 시험 준비 끝!';
  else if(pct>=80) msg='🎉 아주 잘했어요! 조금만 더!';
  else if(pct>=60) msg='👍 좋아요! 틀린 것만 다시 볼까요?';
  else if(pct>=40) msg='💪 반복하면 금방 올라가요!';
  else msg='🌱 천천히 다시 한 번 풀어봐요!';
  $('praise').textContent=msg;
  if(pct>=80) burst();
  const wl=$('wronglist');
  if(wrongs.length===0){ wl.innerHTML='<div class="wrongttl">틀린 문제가 없어요! 🌟</div>'; }
  else{
    let h='<div class="wrongttl">📝 오답 노트 ('+wrongs.length+')</div>';
    wrongs.forEach(w=>{
      const q=w.q;
      const qline = q.concept ? q.text.replace('___','______')
                  : (q.type==='작가' ? '작가는? '+q.target
                  : q.accDisp ? '작품은? ('+q.ctx+')' : q.target);
      h+='<div class="wrong-item"><div class="q">['+q.type+'] '+esc(qline)+'</div>'
       + '<div class="a">정답 <b>'+esc(w.ans)+'</b>  ·  내 답 <s>'+esc(w.user)+'</s></div></div>';
    });
    wl.innerHTML=h;
  }
}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* ============================================================
   공부하기 (카드 내용 보기)
   ============================================================ */
let studyCat='전체', studyCards=[], studyIdx=0;
function renderStudy(){
  const fb=$('studyFilter'); fb.innerHTML='';
  CATS.forEach(c=>{
    const cnt=(c.k==='전체'?DATA.length:DATA.filter(d=>d.cat===c.k).length);
    const el=document.createElement('div'); el.className='f'+(studyCat===c.k?' on':'');
    el.textContent=c.label+' '+cnt;
    el.onclick=()=>{ studyCat=c.k; renderStudy(); };
    fb.appendChild(el);
  });
  studyCards=DATA.filter(d=>studyCat==='전체'||d.cat===studyCat);
  $('studyDeck').innerHTML=studyCards.map(c=>'<div class="slide">'+studyCardHtml(c)+'</div>').join('');
  $('studyDeck').scrollLeft=0; studyIdx=0; updateDeckPos();
}
function updateDeckPos(){
  const deck=$('studyDeck'), w=deck.clientWidth||1;
  studyIdx=Math.max(0, Math.round(deck.scrollLeft/w));
  $('deckPos').textContent=Math.min(studyIdx+1, studyCards.length)+' / '+studyCards.length;
}
function scrollDeck(d){
  const deck=$('studyDeck'), w=deck.clientWidth;
  const ni=Math.min(Math.max(studyIdx+d,0), studyCards.length-1);
  deck.scrollTo({left:ni*w, behavior:'smooth'});
}
function studyCardHtml(c){
  const works=c.works.map(w=>{
    const t=esc(w[0]); const a=w[1]?esc(w[1]):'작자 미상';
    return '<li><span class="t">'+t+'</span> <span class="a">· '+a+'</span></li>';
  }).join('');
  return '<div class="studycard">'
    +'<span class="chip">'+esc(c.cat)+'</span>'
    +'<h3>'+esc(c.genre)+'</h3>'
    +'<div class="era">'+esc(c.era)+'</div>'
    +(c.desc?'<div class="desc">'+esc(c.desc)+'</div>':'')
    +'<div class="wlabel">주요 작품 '+c.works.length+'</div>'
    +'<ul>'+works+'</ul></div>';
}
function showOnly(id){ ['home','study','setup','quiz','result'].forEach(x=>$(x).classList.add('hide')); $(id).classList.remove('hide'); }
function showHome(){ showOnly('home'); window.scrollTo(0,0); }

/* ============================================================
   이벤트
   ============================================================ */
$('startBtn').onclick=()=>{
  const pool=ALLPOOL.filter(q=>(sel.cat==='전체'||q.cat===sel.cat)&&(sel.type==='전체'||q.type===sel.type));
  if(!pool.length) return;
  startQuiz(pool);
};
$('goBtn').onclick=()=>{ if(!answered) check(false); };
$('skipBtn').onclick=()=>{ if(!answered) check(true); };
$('revealBtn').onclick=doReveal;
$('gradeGood').onclick=()=>selfGrade(true);
$('gradeBad').onclick=()=>selfGrade(false);
$('nextBtn').onclick=next;
$('field').addEventListener('keydown',e=>{
  if(e.key==='Enter' && !e.isComposing){ e.preventDefault(); if(!answered) check(false); else next(); }
});
$('hintBtn').onclick=function(){ this.textContent='💡 '+queue[idx].hint; };
$('retryWrong').onclick=()=>{
  if(!wrongs.length){ goHome(); return; }
  queue=shuffle(wrongs.map(w=>w.q)); idx=0; score=0; wrongs=[]; streak=0; bestStreak=0;
  showOnly('quiz'); showQ();
};
$('studyCount').textContent='시대·갈래별 카드 내용을 먼저 익혀요 · '+DATA.length+'장';
$('quizCount').textContent='작품·작가·핵심 내용 빈칸 퀴즈 · '+ALLPOOL.length+'문항';
function goHome(){ showHome(); }
$('resultHome').onclick=goHome;
$('quizHome').onclick=goHome;
$('goStudy').onclick=()=>{ showOnly('study'); renderStudy(); window.scrollTo(0,0); };
$('goQuiz').onclick=()=>{ showOnly('setup'); renderSetup(); window.scrollTo(0,0); };
$('studyHome').onclick=showHome;
$('setupHome').onclick=showHome;
$('deckPrev').onclick=()=>scrollDeck(-1);
$('deckNext').onclick=()=>scrollDeck(1);
$('studyDeck').addEventListener('scroll', ()=>updateDeckPos(), {passive:true});

renderSetup();
</script>
